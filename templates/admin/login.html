<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Admin Green House</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #A8CC00 0%, #7A9900 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: white;
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 400px;
}
.logo { text-align: center; margin-bottom: 30px; }
.logo img { width: 80px; height: 80px; margin-bottom: 15px; }
h1 {
  font-size: 1.8rem;
  color: #1A1A1A;
  margin-bottom: 10px;
  text-align: center;
}
.subtitle {
  color: #666;
  text-align: center;
  margin-bottom: 30px;
  font-size: 0.9rem;
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: #1A1A1A;
  font-size: 0.9rem;
}
input {
  width: 100%;
  padding: 12px;
  border: 2px solid #E0E0E0;
  border-radius: 8px;
  font-size: 1rem;
  transition: border 0.3s;
}
input:focus {
  outline: none;
  border-color: #A8CC00;
}
.btn {
  width: 100%;
  padding: 14px;
  background: #A8CC00;
  color: #1A1A1A;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn:hover {
  background: #7A9900;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(168, 204, 0, 0.4);
}
.error {
  background: #ffebee;
  color: #c62828;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-size: 0.9rem;
  text-align: center;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <img src="/static/img/logo.png" alt="Green House" onerror="this.style.display='none'">
    <h1>Green House</h1>
    <p class="subtitle">Panel de Administración</p>
  </div>
  
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  
  <form method="POST">
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn">Iniciar Sesión</button>
  </form>
</div>
</body>
</html>
